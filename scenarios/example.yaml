name: "Комплексный тест банковского ассистента"

config:
  base_url: "http://localhost:8000/chat"
  timeout: 5.0
  typing_delay: [1, 3]

steps:
  - id: "start"
    user_say: 
      - "Привет! Я хочу взять кредит."
      - "Добрый день. Мне нужны деньги в долг."
      - "Здравствуйте, хочу узнать условия по займу."
    validation:
      intent: "greeting_credit"
      min_similarity: 0.8
    on_success: "check_rate"
    on_fail: "rephrase_start"

  - id: "rephrase_start"
    user_say: 
      - "Меня интересуют условия по потребительскому кредиту."
      - "Я хочу проконсультироваться по поводу кредитования."
    validation:
      min_similarity: 0.6
    on_success: "check_rate"
    on_fail: "terminate"

  - id: "check_rate"
    user_say: 
      - "Какая у вас сейчас процентная ставка?"
      - "Сколько процентов годовых?"
      - "Какой сейчас процент по кредиту?"
    validation:
      contains: ["ставок", "процент", "%", "годовых", "услови"]
    on_success: "ask_amount"
    on_fail: "terminate"

  - id: "ask_amount"
    user_say: 
      - "Мне нужно 500 000 рублей на 3 года."
      - "Хочу оформить пятьсот тысяч на срок три года."
      - "Рассчитайте платеж на 500000 руб, срок 36 месяцев."
    validation:
      intent: "approval_or_calculation"
      min_similarity: 0.7
    on_success: "final_step"
    on_fail: "low_score_handle"

  - id: "low_score_handle"
    user_say: 
      - "Я не совсем понял, так какой будет ежемесячный платеж?"
      - "Вы не ответили, сколько мне платить в месяц?"
    validation:
      min_similarity: 0.6
    on_success: "final_step"
    on_fail: "terminate"

  - id: "final_step"
    user_say: 
      - "Спасибо, мне всё понятно. До свидания!"
      - "Окей, благодарю за информацию. Всего доброго."
      - "Хорошо, я подумаю. До связи."
    validation:
      min_similarity: 0.5
    on_success: "end"
    on_fail: "end"

  - id: "terminate"
    user_say: "Ваш ответ не корректен, я заканчиваю сессию."
    validation:
      min_similarity: 0.0
    on_success: "end"
    on_fail: "end"