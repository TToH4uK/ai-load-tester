name: "Bank Flow Machine Pro"

steps:
  # --- СТАРТ (Центральный узел) ---
  - id: "start"
    bot_say: "Привет! Я могу оформить кредит, проверить баланс или заблокировать карту. Что выберете?"
    transitions:
      - to: "start"
        user_say: ["привет", "здравствуйте", "начало", "добрый день", "меню"]
      - to: "credit_init"
        user_say: ["хочу взять кредит", "оформить займ", "кредитование", "нужны наличные", "взять в долг"]
      - to: "balance_check"
        user_say: ["узнать баланс", "сколько денег на счету", "остаток по карте", "баланс счета"]
      - to: "card_block_confirm"
        user_say: ["срочно заблокировать карту", "украли карточку", "потерял карту", "блок карты"]
    on_fail: "rephrase_start"

  # --- ВЕТКА: БЛОКИРОВКА ---
  - id: "card_block_confirm"
    bot_say: "Вы уверены, что хотите заблокировать карту?"
    transitions:
      - to: "card_blocked_final"
        user_say: ["да", "уверен", "блокируй", "подтверждаю"]
      - to: "start"
        user_say: ["нет", "отмена", "не надо", "я передумал"]
    # Если юзер на этом шаге несет бред (например, шлет сумму), кидаем его в начало
    on_fail: "start"

  - id: "card_blocked_final"
    bot_say: "Карта заблокирована. Всего доброго!"
    is_final: true

  # --- ВЕТКА: КРЕДИТ ---
  - id: "credit_init"
    bot_say: "Вам нужен кредит наличными или ипотека?"
    transitions:
      - to: "loan_check_history"
        user_say: ["наличные", "потреб", "кредит наличными", "обычный займ"]
      - to: "mortgage_region"
        user_say: ["ипотека", "квартира", "дом", "жилье в ипотеку"]
    on_fail: "start"

  - id: "loan_check_history"
    bot_say: "У вас были просрочки за последний год?"
    transitions:
      - to: "loan_info"
        user_say: ["нет", "не было", "чистая история", "все чисто", "никогда"]
      - to: "loan_reject"
        user_say: ["да", "были", "случалось", "просрочки", "задерживал"]
    on_fail: "loan_check_history"

  - id: "loan_info"
    bot_say: "Ставка 12%. Сумма: до 1 млн или больше?"
    transitions:
      - to: "loan_insurance"
        user_say: ["до миллиона", "500000", "полмиллиона", "небольшая сумма"]
      - to: "loan_vip_wait"
        user_say: ["больше миллиона", "2000000", "много", "огромная сумма"]
    on_fail: "loan_info"

  - id: "loan_insurance"
    bot_say: "Включим страховку?"
    transitions:
      - to: "end_dialog"
        user_say: ["да", "согласен", "включай", "окей"]
      - to: "end_dialog"
        user_say: ["нет", "не нужно", "без страховки", "отказ"]
    on_fail: "end_dialog"

  # --- ФИНАЛЫ ---
  - id: "loan_reject"
    bot_say: "К сожалению, отказ. Приходите через 3 месяца."
    is_final: true

  - id: "loan_vip_wait"
    bot_say: "Для больших сумм ждите звонка менеджера."
    is_final: true

  - id: "mortgage_final"
    bot_say: "Заявка на ипотеку принята!"
    is_final: true

  - id: "rephrase_start"
    bot_say: "Не понял. Напишите: 'кредит', 'баланс' или 'блок'."
    on_fail: "start"

  - id: "end_dialog"
    bot_say: "Спасибо! До свидания!"
    is_final: true