name: "Bank Flow Machine Pro"

steps:
  # --- START (Main Menu) ---
  - id: "start"
    bot_say: "Hello! I can help you with a loan, check your balance, or block your card. What would you like?"
    transitions:
      - to: "start"
        user_say: ["hello", "hi", "hey", "start", "menu", "good morning"]
      - to: "credit_init"
        user_say: ["i want a loan", "get credit", "need cash", "borrow money", "apply for loan"]
      - to: "balance_check"
        user_say: ["check balance", "how much money", "account status", "my balance"]
      - to: "card_block_confirm"
        user_say: ["block my card", "lost my card", "stolen card", "card blocking"]
    on_fail: "rephrase_start"

  # --- BRANCH: BLOCKING ---
  - id: "card_block_confirm"
    bot_say: "Are you sure you want to block your card?"
    transitions:
      - to: "card_blocked_final"
        user_say: ["yes", "i am sure", "block it", "confirm"]
      - to: "start"
        user_say: ["no", "cancel", "dont do it", "i changed my mind"]
    on_fail: "start"

  - id: "card_blocked_final"
    bot_say: "Your card has been blocked. Have a nice day!"
    is_final: true

  # --- BRANCH: LOAN ---
  - id: "credit_init"
    bot_say: "Do you need a personal loan or a mortgage?"
    transitions:
      - to: "loan_check_history"
        user_say: ["personal loan", "cash", "need some cash", "ordinary loan"]
      - to: "mortgage_region"
        user_say: ["mortgage", "buy a house", "apartment loan", "home loan"]
    on_fail: "start"

  - id: "loan_check_history"
    bot_say: "Have you had any payment delays in the last year?"
    transitions:
      - to: "loan_info"
        user_say: ["no", "never", "clear history", "all clean", "no delays"]
      - to: "loan_reject"
        user_say: ["yes", "i had some", "it happened", "delays", "late payments"]
    on_fail: "loan_check_history"

  - id: "loan_info"
    bot_say: "The rate is 12%. Do you need up to 1 million or more?"
    transitions:
      - to: "loan_insurance"
        user_say: ["less than a million", "500000", "small amount", "not much"]
      - to: "loan_vip_wait"
        user_say: ["more than a million", "2000000", "large amount", "huge sum"]
    on_fail: "loan_info"

  - id: "loan_insurance"
    bot_say: "Would you like to include insurance?"
    transitions:
      - to: "end_dialog"
        user_say: ["yes", "i agree", "include it", "okay"]
      - to: "end_dialog"
        user_say: ["no", "not needed", "without insurance", "decline"]
    on_fail: "end_dialog"

  # --- FINALS ---
  - id: "loan_reject"
    bot_say: "Unfortunately, you were declined. Please try again in 3 months."
    is_final: true

  - id: "loan_vip_wait"
    bot_say: "For large amounts, please wait for a manager's call."
    is_final: true

  - id: "mortgage_final"
    bot_say: "Your mortgage application has been accepted!"
    is_final: true

  - id: "rephrase_start"
    bot_say: "I didn't understand. Please type: 'loan', 'balance', or 'block'."
    on_fail: "start"

  - id: "end_dialog"
    bot_say: "Thank you! Goodbye!"
    is_final: true