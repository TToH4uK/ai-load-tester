services:
  bank-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: bank_bot_container
    network_mode: "host"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HUB_READ_TIMEOUT=300
    volumes:
      - ./scenarios:/app/scenarios
    # Добавили многопоточность, чтобы FastAPI не захлёбывался
    #command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_container
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - bot-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter_container
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9101:9101"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
      - '--web.listen-address=:9101'
    networks:
      - bot-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_container
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - bot-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  locust-master:
    build:
      context: .
      dockerfile: Dockerfile.locust
    container_name: locust_master_container
    networks:
      - bot-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/mnt/locust
    ports:
      - "8089:8089"
    command: -f /mnt/locust/locustfile.py --master --host http://host.docker.internal:8000

  locust-worker:
    build:
      context: .
      dockerfile: Dockerfile.locust
    networks:
      - bot-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/mnt/locust
    command: -f /mnt/locust/locustfile.py --worker --master-host locust-master

networks:
  bot-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
